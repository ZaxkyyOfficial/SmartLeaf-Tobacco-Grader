# Pengaturan Memori & Encoding
org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8

# Pengaturan AndroidX (Wajib untuk library modern)
android.useAndroidX=true

# Optimasi R Class (Mempercepat build)
android.nonTransitiveRClass=true

# Biarkan ini jika kamu menggunakan R8 untuk mengecilkan ukuran APK
android.r8.strictFullModeForKeepRules=false

# Pengaturan tambahan lainnya yang masih relevan
android.uniquePackageNames=false
android.dependency.useConstraints=true
android.builtInKotlin=true